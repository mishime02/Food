      b.style.display='block';
      b.textContent += msg + '\n\n';
    }
    window.addEventListener('error', function(e){
      if(e.message){ show('錯誤: ' + e.message + (e.filename?(' @ '+e.filename+':'+e.lineno):'')); }

    window.addEventListener('unhandledrejection', function(e){

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

const WEEKDAY_LABEL = ["日", "一", "二", "三", "四", "五", "六"];

const SYSTEM_PROMPT = `你是一個食物影像辨識與營養估算助手。使用者會上傳一張食物照片,請你:
1. 辨識照片中所有可辨認的食物項目(最多 6 項)。
2. 針對每個食物項目,根據照片中可見的份量大小與常見烹調方式,估算份量描述、公克數、熱量(大卡)、蛋白質、醣類、脂肪(公克)。允許合理誤差,不需要過度保守。

只能回覆一個 JSON 物件,不要包含任何說明文字,不要使用 markdown 程式碼框,不要加註解。JSON 格式如下:
{"mealName":"整餐的簡短中文名稱","items":[{"name":"食物中文名稱","confidence":0.0到1.0之間的數字,"portionDescription":"份量描述,例如 一碗約200克","portionGrams":數字,"calories":數字,"proteinG":數字,"carbsG":數字,"fatG":數字}]}

如果照片中完全看不出食物,回覆:{"mealName":"","items":[]}

請辨識這張照片中的食物,並估算熱量與營養素。只回覆 JSON,不要加任何說明。`;

function waitForFirebase() {
  return new Promise((resolve) => {
    if (window.fb) { resolve(); return; }
    window.addEventListener('firebase-ready', () => resolve(), { once: true });
  });
}

function dateKeyOf(d = new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 1024;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
          else { width = Math.round((width * maxDim) / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.82);
        resolve({ dataUrl, base64: dataUrl.split(",")[1], mediaType: "image/jpeg" });
      };
      img.onerror = () => reject(new Error("image_load_failed"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("file_read_failed"));
    reader.readAsDataURL(file);
  });
}

async function identifyFood(base64, mediaType) {
  const imagePart = { inlineData: { data: base64, mimeType: mediaType } };
  const result = await window.fb.model.generateContent([SYSTEM_PROMPT, imagePart]);
  let raw = result.response.text().trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
  const match = raw.match(/\{[\s\S]*\}/);
  return JSON.parse(match ? match[0] : raw);
}

async function loadLog(uid) {
  try {
    const ref = window.fb.doc(window.fb.db, "users", uid, "foodlog", "main");
    const snap = await window.fb.getDoc(ref);
    if (snap.exists()) {
      const data = snap.data();
      return { goal: data.goal || 2000, entries: Array.isArray(data.entries) ? data.entries : [] };
    }
    return { goal: 2000, entries: [] };
  } catch (e) {
    console.error(e);
    return { goal: 2000, entries: [] };
  }
}

async function saveLog(uid, log) {
  try {
    const ref = window.fb.doc(window.fb.db, "users", uid, "foodlog", "main");
    await window.fb.setDoc(ref, log);
    return true;
  } catch (e) {
    console.error("儲存失敗", e);
    return false;
  }
}

const tokens = {
  bg: "#FFF6EE", ink: "#4A3F3B", inkSoft: "#A6968B", pink: "#FF7FA0",
  mint: "#BFEBD4", yellow: "#FFD66B", lavender: "#D9CCF0", peach: "#FFD9C0",
  card: "#FFFFFF", line: "#F2E4D8",
  fontDisplay: "'Noto Sans TC', sans-serif", fontBody: "'Noto Sans TC', sans-serif", fontNumber: "'Baloo 2', sans-serif",
};

function Mascot({ state = "idle", size = 72 }) {

      {/* 飯糰主體:矮胖、底寬、頂角圓鈍 */}
      <path d="M50 24 C58 24 63 30 67 37 L88 74 C92 81 88 90 79 91 C70 92 60 93 50 93 C40 93 30 92 21 91 C12 90 8 81 12 74 L33 37 C37 30 42 24 50 24 Z" fill="#FCFAF4" stroke="#EDE6D6" strokeWidth="2" />
      {/* 米粒質感小點 */}
      <circle cx="40" cy="46" r="1.4" fill="#ECE6D6" />
      <circle cx="61" cy="50" r="1.4" fill="#ECE6D6" />
      <circle cx="33" cy="62" r="1.4" fill="#ECE6D6" />
      <circle cx="68" cy="64" r="1.4" fill="#ECE6D6" />
      {/* 正面方形海苔(中間偏下) */}
      <rect x="40" y="68" width="20" height="20" rx="3" fill="#3C5A45" />
      {state === "scanning" ? (
        <>
          <path d="M37 52 q5 5 10 0" stroke="#4A3F3B" strokeWidth="3" fill="none" strokeLinecap="round" />
          <path d="M53 52 q5 5 10 0" stroke="#4A3F3B" strokeWidth="3" fill="none" strokeLinecap="round" />
        </>
      ) : state === "happy" ? (
        <>
          <path d="M37 54 q5 -7 10 0" stroke="#4A3F3B" strokeWidth="3" fill="none" strokeLinecap="round" />
          <path d="M53 54 q5 -7 10 0" stroke="#4A3F3B" strokeWidth="3" fill="none" strokeLinecap="round" />
        </>
      ) : (
        <>
          <circle cx="42" cy="52" r="3.5" fill="#4A3F3B" />
          <circle cx="58" cy="52" r="3.5" fill="#4A3F3B" />
        </>
      )}
      {/* 紅暈 */}
      <circle cx="34" cy="60" r="4.5" fill="#FF9EB5" opacity="0.55" />
      <circle cx="66" cy="60" r="4.5" fill="#FF9EB5" opacity="0.55" />
      {/* 嘴巴 */}
      {state === "scanning" ? (
        <circle cx="50" cy="64" r="2.5" fill="#4A3F3B" />
      ) : (
        <path d="M45 63 q5 6 10 0" stroke="#4A3F3B" strokeWidth="2.5" fill="none" strokeLinecap="round" />

      {state === "happy" && (
        <>
          <path d="M14 32 l3.5 -7 3.5 7 7 3.5 -7 3.5 -3.5 7 -3.5 -7 -7 -3.5 z" fill="#FFD66B" className="sparkle" />
          <path d="M80 26 l3 -6 3 6 6 3 -6 3 -3 6 -3 -6 -6 -3 z" fill="#FF9EB5" className="sparkle" />
        </>
      )}
    </svg>
  );
}

function ConfidenceSticker({ confidence }) {
  const pct = Math.round((confidence || 0) * 100);
  return (
    <div style={{ background: tokens.yellow, color: tokens.ink, fontFamily: tokens.fontBody, fontSize: "10px", fontWeight: 700, borderRadius: "9999px", padding: "3px 9px", transform: "rotate(-6deg)", whiteSpace: "nowrap", flexShrink: 0, boxShadow: "0 2px 0 rgba(0,0,0,0.08)" }}>
      像 {pct}% 唷
    </div>
  );
}

function MacroPill({ label, value, color }) {
  return (
    <span className="text-xs font-medium px-2 py-0.5 rounded-full" style={{ background: color, color: tokens.ink }}>
      {label} {value}g
    </span>
  );
}

function SpecimenItem({ item, multiplier, onRemove }) {
  return (
    <div className="flex items-start justify-between gap-3 p-3" style={{ borderBottom: "1px dashed " + tokens.line }}>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap">
          <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink }} className="text-base">{item.name}</span>
          <ConfidenceSticker confidence={item.confidence} />
        </div>
        <div style={{ color: tokens.inkSoft }} className="text-xs mt-1">{item.portionDescription}</div>
        <div className="flex gap-1.5 mt-2 flex-wrap">
          <MacroPill label="蛋白質" value={Math.round(item.proteinG * multiplier)} color={tokens.mint} />
          <MacroPill label="醣類" value={Math.round(item.carbsG * multiplier)} color={tokens.yellow} />
          <MacroPill label="脂肪" value={Math.round(item.fatG * multiplier)} color={tokens.lavender} />
        </div>
      </div>
      <div className="flex flex-col items-end gap-2 flex-shrink-0">
        <div style={{ fontFamily: tokens.fontNumber, color: tokens.pink }} className="text-xl font-bold">
          {Math.round(item.calories * multiplier)}
          <span style={{ fontFamily: tokens.fontBody, color: tokens.inkSoft }} className="text-xs font-normal"> 大卡</span>
        </div>
        <button onClick={onRemove} aria-label="移除這個項目" className="rounded-full p-1" style={{ color: tokens.inkSoft }}>✕</button>
      </div>
    </div>
  );
}

function LedgerRow({ entry, onDelete }) {
  const time = new Date(entry.ts).toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
  return (
    <div className="flex items-center justify-between gap-3 py-3" style={{ borderBottom: "1px dashed " + tokens.line }}>
      <div className="min-w-0">
        <div className="flex items-baseline gap-2">
          <span style={{ color: tokens.inkSoft }} className="text-xs">{time}</span>
          <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink }} className="text-sm truncate">{entry.mealName}</span>
        </div>
        <div className="flex gap-1.5 mt-1 flex-wrap">
          <MacroPill label="蛋" value={entry.protein} color={tokens.mint} />
          <MacroPill label="醣" value={entry.carbs} color={tokens.yellow} />
          <MacroPill label="脂" value={entry.fat} color={tokens.lavender} />
        </div>
      </div>
      <div className="flex items-center gap-2 flex-shrink-0">
        <span style={{ fontFamily: tokens.fontNumber, color: tokens.pink }} className="text-base font-bold">{entry.calories}</span>
        <button onClick={() => onDelete(entry.id)} aria-label="刪除這筆紀錄" style={{ color: tokens.inkSoft }} className="p-1">🗑</button>
      </div>
    </div>
  );
}

function WeekChart({ data, goal }) {
  const max = Math.max(goal, ...data.map((d) => d.total), 1);
  const barMax = 120;
  const goalLineBottom = Math.min(barMax, Math.round((goal / max) * barMax));
  return (
    <div className="relative" style={{ height: `${barMax + 24}px` }}>
      <div className="absolute left-0 right-0" style={{ bottom: `${goalLineBottom + 20}px`, borderTop: "1px dashed " + tokens.pink }} />
      <div className="flex items-end justify-between gap-2 h-full">
        {data.map((d) => {
          const h = Math.max(4, Math.round((d.total / max) * barMax));
          return (
            <div key={d.key} className="flex flex-col items-center flex-1 gap-1 justify-end h-full">
              <div className="w-full rounded-t-xl" style={{ height: `${h}px`, background: d.total > 0 ? tokens.pink : tokens.line }} />
              <span style={{ color: tokens.inkSoft }} className="text-xs">{d.label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div className="min-h-screen w-full flex flex-col items-center justify-center gap-3" style={{ background: tokens.bg }}>
      <Mascot state="idle" size={64} />

}

function LoginScreen({ onGoogle, onGuest, busy, error }) {
  return (
    <div className="min-h-screen w-full flex items-center justify-center p-4" style={{ background: tokens.bg }}>
      <div className="cute-card p-6 rounded-3xl flex flex-col items-center gap-3 w-full" style={{ background: tokens.card, maxWidth: "320px" }}>
        <Mascot state="idle" size={72} />
        <h1 style={{ fontFamily: tokens.fontBody, color: tokens.ink, fontWeight: 700 }} className="text-2xl">飯飯食記</h1>
        <p style={{ color: tokens.inkSoft }} className="text-sm text-center">拍張照,飯飯幫你算熱量唷!先登入才能保存你的紀錄。</p>
        <button onClick={onGoogle} disabled={busy} className="cute-btn w-full rounded-full py-2.5 text-sm font-bold" style={{ background: tokens.pink, color: "#fff" }}>用 Google 登入</button>
        <button onClick={onGuest} disabled={busy} className="cute-btn w-full rounded-full py-2.5 text-sm font-medium" style={{ background: tokens.card, color: tokens.ink, border: "1px solid " + tokens.line }}>先逛逛(訪客模式)</button>
        <p style={{ color: tokens.inkSoft }} className="text-xs text-center">訪客模式的紀錄只存在這台裝置,清除瀏覽器資料會不見唷。</p>
        {error && <p style={{ color: tokens.pink }} className="text-xs text-center">{error}</p>}
      </div>
    </div>
  );
}

function App() {
  const [authUser, setAuthUser] = useState(undefined);
  const [authBusy, setAuthBusy] = useState(false);
  const [authError, setAuthError] = useState(null);

  const [view, setView] = useState("snap");
  const [log, setLog] = useState({ goal: 2000, entries: [] });
  const [logLoaded, setLogLoaded] = useState(false);

  const [photo, setPhoto] = useState(null);
  const [analyzing, setAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const [excluded, setExcluded] = useState(new Set());
  const [multiplier, setMultiplier] = useState(1);
  const [error, setError] = useState(null);
  const [justLogged, setJustLogged] = useState(false);

  const [editingGoal, setEditingGoal] = useState(false);
  const [goalInput, setGoalInput] = useState("2000");
  const [confirmClear, setConfirmClear] = useState(false);

  const fileInputRef = useRef(null);

  useEffect(() => {
    let unsub;
    waitForFirebase().then(() => {
      unsub = window.fb.onAuthStateChanged(window.fb.auth, (u) => setAuthUser(u || null));
    });
    return () => { if (unsub) unsub(); };
  }, []);

  useEffect(() => {
    if (!authUser) return;
    (async () => {
      const l = await loadLog(authUser.uid);
      setLog(l);
      setGoalInput(String(l.goal));
      setLogLoaded(true);
    })();
  }, [authUser]);

  async function handleGoogleLogin() {
    setAuthBusy(true); setAuthError(null);
    try { await window.fb.signInWithPopup(window.fb.auth, new window.fb.GoogleAuthProvider()); }
    catch (e) { setAuthError("登入失敗,再試一次看看。"); }
    finally { setAuthBusy(false); }
  }
  async function handleGuestLogin() {
    setAuthBusy(true); setAuthError(null);
    try { await window.fb.signInAnonymously(window.fb.auth); }
    catch (e) { setAuthError("進入失敗,再試一次看看。"); }
    finally { setAuthBusy(false); }
  }
  async function handleUpgrade() {
    try { await window.fb.linkWithPopup(window.fb.auth.currentUser, new window.fb.GoogleAuthProvider()); }
    catch (e) { console.error(e); }
  }
  async function handleSignOut() {
    await window.fb.signOut(window.fb.auth);
  }

  const today = dateKeyOf();
  const todayTotal = useMemo(() => log.entries.filter((e) => e.dateKey === today).reduce((s, e) => s + e.calories, 0), [log.entries, today]);

  const weekData = useMemo(() => {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = dateKeyOf(d);
      const total = log.entries.filter((e) => e.dateKey === key).reduce((s, e) => s + e.calories, 0);
      days.push({ key, label: WEEKDAY_LABEL[d.getDay()], total });
    }
    return days;
  }, [log.entries]);

  const groupedEntries = useMemo(() => {
    const groups = {};
    log.entries.forEach((e) => { if (!groups[e.dateKey]) groups[e.dateKey] = []; groups[e.dateKey].push(e); });
    return Object.entries(groups).sort((a, b) => (a[0] < b[0] ? 1 : -1));
  }, [log.entries]);

  function resetCapture() {
    setPhoto(null); setResult(null); setExcluded(new Set()); setMultiplier(1); setError(null);
    if (fileInputRef.current) fileInputRef.current.value = "";
  }

  async function handleFileChange(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setError(null); setResult(null); setExcluded(new Set()); setMultiplier(1);
    try { setPhoto(await resizeImage(file)); }
    catch (err) { setError("飯飯讀不出這張照片,換一張試試看!"); }
  }

  async function handleIdentify() {
    if (!photo) return;
    setAnalyzing(true); setError(null);
    try {
      const data = await identifyFood(photo.base64, photo.mediaType);
      if (!data.items || data.items.length === 0) { setError("飯飯看不太出來,試著靠近一點或加強光線吧!"); setResult(null); }
      else setResult(data);
    } catch (err) { setError("飯飯剛剛恍神了,再試一次看看!"); }
    finally { setAnalyzing(false); }
  }

  const activeItems = result ? result.items.filter((_, i) => !excluded.has(i)) : [];
  const totals = activeItems.reduce((acc, it) => ({
    calories: acc.calories + it.calories * multiplier,
    protein: acc.protein + it.proteinG * multiplier,
    carbs: acc.carbs + it.carbsG * multiplier,
    fat: acc.fat + it.fatG * multiplier,
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 });

  async function handleSaveEntry() {
    if (!result || activeItems.length === 0 || !authUser) return;
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      ts: Date.now(), dateKey: dateKeyOf(),
      mealName: result.mealName || activeItems.map((i) => i.name).join("、"),
      calories: Math.round(totals.calories), protein: Math.round(totals.protein),
      carbs: Math.round(totals.carbs), fat: Math.round(totals.fat),
    };
    const newLog = { ...log, entries: [entry, ...log.entries] };
    setLog(newLog);
    await saveLog(authUser.uid, newLog);
    setJustLogged(true);
    setTimeout(() => setJustLogged(false), 1600);
    setTimeout(() => resetCapture(), 1600);
  }

  async function handleDeleteEntry(id) {
    const newLog = { ...log, entries: log.entries.filter((e) => e.id !== id) };
    setLog(newLog);
    await saveLog(authUser.uid, newLog);
  }

  async function handleSaveGoal() {
    const val = parseInt(goalInput, 10);
    const newLog = { ...log, goal: Number.isFinite(val) && val > 0 ? val : log.goal };
    setLog(newLog); setGoalInput(String(newLog.goal));
    await saveLog(authUser.uid, newLog);
    setEditingGoal(false);
  }

  async function handleClearAll() {
    const newLog = { goal: log.goal, entries: [] };
    setLog(newLog);
    await saveLog(authUser.uid, newLog);
    setConfirmClear(false);
  }

  if (authUser === undefined) return <LoadingScreen />;
  if (authUser === null) return <LoginScreen onGoogle={handleGoogleLogin} onGuest={handleGuestLogin} busy={authBusy} error={authError} />;

  const goalPct = Math.min(100, Math.round((todayTotal / (log.goal || 1)) * 100));
  const mascotState = analyzing ? "scanning" : justLogged ? "happy" : "idle";

  return (
    <div className="min-h-screen w-full" style={{ background: "radial-gradient(rgba(255,159,181,0.18) 1.5px, transparent 1.5px) 0 0/22px 22px, " + tokens.bg, fontFamily: tokens.fontBody }}>
      <div className="max-w-md mx-auto px-4 py-6 pb-16">
        <header className="mb-5 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3">
            <Mascot state="idle" size={48} />
            <div>
              <h1 style={{ fontFamily: tokens.fontBody, color: tokens.ink, fontWeight: 700 }} className="text-2xl">飯飯食記</h1>
              <p style={{ color: tokens.inkSoft }} className="text-xs mt-0.5">拍張照,飯飯幫你算熱量唷!</p>
            </div>
          </div>
          <button onClick={handleSignOut} style={{ color: tokens.inkSoft }} className="text-xs flex-shrink-0">登出</button>
        </header>

        {authUser.isAnonymous && (
          <button onClick={handleUpgrade} className="w-full text-left text-xs px-3 py-2 mb-4 rounded-2xl" style={{ background: tokens.card, color: tokens.inkSoft, border: "1px dashed " + tokens.line }}>
            目前是訪客模式,紀錄只存在這台裝置 · 點此升級成 Google 帳號保留紀錄 →
          </button>
        )}

        <div className="flex gap-1.5 mb-5">
          {[{ id: "snap", label: "拍照辨識", emoji: "📷" }, { id: "ledger", label: "我的帳本", emoji: "📒" }].map((t) => {
            const active = view === t.id;
            return (
              <button key={t.id} onClick={() => setView(t.id)} className="flex items-center gap-1.5 px-3.5 py-2 text-sm font-medium rounded-full" style={{ color: active ? "#fff" : tokens.ink, background: active ? tokens.pink : tokens.card, boxShadow: "0 2px 0 rgba(74,63,59,0.1)" }}>
                <span>{t.emoji}</span>{t.label}
              </button>
            );
          })}
        </div>

        {view === "snap" ? (
          <div>
            {!photo ? (
              <button onClick={() => fileInputRef.current?.click()} className="w-full flex flex-col items-center justify-center gap-2" style={{ background: tokens.card, border: "3px dashed " + tokens.peach, borderRadius: "24px", height: "260px" }}>
                <Mascot state="idle" size={64} />
                <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink, fontWeight: 700 }} className="text-lg">戳我拍照!</span>
                <span style={{ color: tokens.inkSoft }} className="text-xs">可以拍照,也能從相簿選一張</span>
              </button>
            ) : (
              <div className="relative w-full overflow-hidden" style={{ borderRadius: "24px", border: "1px solid " + tokens.line, height: "260px" }}>
                <img src={photo.dataUrl} alt="食物照片" className="w-full h-full object-cover" />
                {analyzing && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center gap-2" style={{ background: "rgba(255,246,238,0.85)" }}>
                    <Mascot state="scanning" size={64} />
                    <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink }} className="text-sm">嗅嗅中…</span>
                  </div>
                )}
              </div>
            )}

            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileChange} className="hidden" />

            {photo && !result && (
              <div className="flex gap-2 mt-3">
                <button onClick={resetCapture} disabled={analyzing} className="cute-btn flex items-center justify-center gap-1.5 px-4 py-2.5 text-sm font-medium rounded-full" style={{ background: tokens.card, color: tokens.ink }}>↻ 重新拍攝</button>
                <button onClick={handleIdentify} disabled={analyzing} className="cute-btn flex-1 flex items-center justify-center gap-1.5 px-4 py-2.5 text-sm font-bold rounded-full" style={{ background: tokens.pink, color: "#fff" }}>
                  {analyzing && <span className="spin">⟳</span>}
                  {analyzing ? "嗅嗅中…" : "辨識這張照片"}
                </button>
              </div>
            )}

            {error && (
              <div className="fade-up cute-card mt-3 text-sm p-3 rounded-2xl" style={{ background: tokens.card, color: tokens.ink }}>{error}</div>
            )}

            {result && (
              <div className="fade-up mt-4">
                <div className="cute-card" style={{ background: tokens.card, borderRadius: "24px", overflow: "hidden" }}>
                  <div className="px-4 pt-4 pb-1">
                    <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink }} className="text-lg">{result.mealName || "這一餐"}</span>
                  </div>
                  {result.items.map((item, i) => excluded.has(i) ? null : (
                    <SpecimenItem key={i} item={item} multiplier={multiplier} onRemove={() => setExcluded((prev) => new Set(prev).add(i))} />
                  ))}
                  {activeItems.length === 0 && (
                    <div className="p-4 text-sm text-center" style={{ color: tokens.inkSoft }}>所有項目都被移除了。</div>
                  )}

                  <div className="px-4 py-3 flex items-center justify-between flex-wrap gap-2" style={{ borderTop: "1px dashed " + tokens.line }}>
                    <span style={{ color: tokens.inkSoft }} className="text-xs">份量倍數</span>
                    <div className="flex gap-1.5">
                      {[{ v: 0.5, l: "半份" }, { v: 1, l: "原份" }, { v: 1.5, l: "1.5份" }, { v: 2, l: "兩份" }].map((opt) => (
                        <button key={opt.v} onClick={() => setMultiplier(opt.v)} className="text-xs px-2.5 py-1.5 rounded-full font-medium" style={{ background: multiplier === opt.v ? tokens.pink : tokens.bg, color: multiplier === opt.v ? "#fff" : tokens.ink }}>{opt.l}</button>
                      ))}
                    </div>
                  </div>

                  <div className="px-4 py-3.5 flex items-center justify-between" style={{ background: tokens.bg }}>
                    <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink }} className="text-sm">這份餐點共</span>
                    <span style={{ fontFamily: tokens.fontNumber, color: tokens.pink }} className="text-3xl font-bold">
                      {Math.round(totals.calories)} <span style={{ fontFamily: tokens.fontBody, color: tokens.inkSoft }} className="text-sm font-medium">大卡</span>
                    </span>
                  </div>
                </div>

                <div className="flex gap-2 mt-3">
                  <button onClick={resetCapture} className="cute-btn flex items-center justify-center gap-1.5 px-4 py-2.5 text-sm font-medium rounded-full" style={{ background: tokens.card, color: tokens.ink }}>↻ 重拍</button>
                  <button onClick={handleSaveEntry} disabled={activeItems.length === 0} className="cute-btn flex-1 flex items-center justify-center gap-1.5 px-4 py-2.5 text-sm font-bold rounded-full" style={{ background: tokens.mint, color: tokens.ink }}>✓ 記錄這一餐</button>
                </div>
              </div>
            )}

            {justLogged && (
              <div className="fixed inset-0 flex items-center justify-center pointer-events-none" style={{ zIndex: 50 }}>
                <div className="pop-in flex flex-col items-center gap-1 px-6 py-4 rounded-3xl" style={{ background: tokens.card, boxShadow: "0 4px 0 rgba(74,63,59,0.15)" }}>
                  <Mascot state="happy" size={64} />
                  <span style={{ fontFamily: tokens.fontDisplay, color: tokens.ink }} className="text-base">記好了!太棒了</span>
                </div>
              </div>
            )}

            <p style={{ color: tokens.inkSoft }} className="text-xs text-center mt-6">估算僅供參考,非醫療建議。</p>
          </div>
        ) : (
          <div>
            <div className="cute-card p-4 mb-4" style={{ background: tokens.card, borderRadius: "24px" }}>
              <div className="flex items-end justify-between">
                <div>
                  <div style={{ color: tokens.inkSoft }} className="text-xs">今日累計</div>
                  <div style={{ fontFamily: tokens.fontNumber, color: tokens.ink }} className="text-3xl font-bold">
                    {todayTotal} <span style={{ fontFamily: tokens.fontBody, color: tokens.inkSoft }} className="text-sm font-medium">大卡</span>
                  </div>
                </div>
                <div className="text-right">
                  {editingGoal ? (
                    <div className="flex items-center gap-1">
                      <input type="number" value={goalInput} onChange={(e) => setGoalInput(e.target.value)} className="w-20 text-sm px-2 py-1 text-right rounded-full" style={{ border: "1px solid " + tokens.line }} />
                      <button onClick={handleSaveGoal} style={{ color: tokens.mint }}>✓</button>
                    </div>
                  ) : (
                    <button onClick={() => setEditingGoal(true)} className="flex items-center gap-1" style={{ color: tokens.inkSoft }}>
                      <span className="text-xs">目標 {log.goal} 大卡</span>✏️
                    </button>
                  )}
                </div>
              </div>
              <div className="mt-2 w-full h-2 rounded-full overflow-hidden" style={{ background: tokens.line }}>
                <div className="h-full rounded-full" style={{ width: `${goalPct}%`, background: tokens.pink }} />
              </div>
            </div>

            <div className="cute-card p-4 mb-4" style={{ background: tokens.card, borderRadius: "24px" }}>
              <div style={{ color: tokens.inkSoft }} className="text-xs mb-2">近七天熱量</div>
              {log.entries.length === 0 ? (
                <div style={{ color: tokens.inkSoft }} className="text-sm text-center py-8">還沒有資料,記錄第一餐後這裡會顯示趨勢唷!</div>
              ) : (
                <WeekChart data={weekData} goal={log.goal} />
              )}
            </div>

            <div className="cute-card p-4" style={{ background: tokens.card, borderRadius: "24px" }}>
              {!logLoaded ? (
                <div style={{ color: tokens.inkSoft }} className="text-sm text-center py-6">載入中…</div>
              ) : log.entries.length === 0 ? (
                <div style={{ color: tokens.inkSoft }} className="text-sm text-center py-8">還沒有任何紀錄,拍張照片開始你的飲食帳本吧!</div>
              ) : (
                groupedEntries.map(([dKey, entries]) => {
                  const d = new Date(dKey);
                  const label = `${d.getMonth() + 1}月${d.getDate()}日 週${WEEKDAY_LABEL[d.getDay()]}`;
                  const dayTotal = entries.reduce((s, e) => s + e.calories, 0);
                  return (
                    <div key={dKey} className="mb-2">
                      <div className="flex items-baseline justify-between mt-3 mb-1">
                        <span className="text-xs font-medium px-2.5 py-0.5 rounded-full" style={{ background: tokens.bg, color: tokens.inkSoft }}>{label}</span>
                        <span style={{ color: tokens.inkSoft }} className="text-xs">{dayTotal} 大卡</span>
                      </div>
                      {entries.map((entry) => (<LedgerRow key={entry.id} entry={entry} onDelete={handleDeleteEntry} />))}
                    </div>
                  );
                })
              )}
            </div>

            {log.entries.length > 0 && (
              <div className="mt-4 text-center">
                {!confirmClear ? (
                  <button onClick={() => setConfirmClear(true)} className="text-xs" style={{ color: tokens.inkSoft }}>清除所有紀錄</button>
                ) : (
                  <div className="flex items-center justify-center gap-3 text-xs">
                    <span style={{ color: tokens.pink }}>確定要清除全部紀錄嗎?無法復原。</span>
                    <button onClick={() => setConfirmClear(false)} style={{ color: tokens.inkSoft }}>取消</button>
                    <button onClick={handleClearAll} style={{ color: tokens.pink, fontWeight: 700 }}>清除</button>
                  </div>
                )}
              </div>
            )}

            <p style={{ color: tokens.inkSoft }} className="text-xs text-center mt-6">估算僅供參考,非醫療建議。</p>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
